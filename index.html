<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOI Status & Metadata Tool</title>
    <style>
        :root { --github-green: #2da44e; --github-red: #cf222e; --border: #d0d7de; }
        body { font-family: -apple-system, sans-serif; max-width: 850px; margin: 40px auto; padding: 0 20px; color: #24292f; line-height: 1.5; }
        h1 { border-bottom: 1px solid var(--border); padding-bottom: 10px; font-weight: 600; }
        .controls { background: #f6f8fa; padding: 20px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 20px; }
        textarea { width: 100%; height: 120px; padding: 12px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; margin-bottom: 15px; font-family: monospace; font-size: 14px; }
        .btn-group { display: flex; gap: 10px; }
        button { background-color: var(--github-green); color: white; border: 1px solid rgba(27,31,36,0.15); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; }
        button#exportBtn { background-color: #0969da; }
        button:hover { opacity: 0.9; }
        button:disabled { background-color: #94d3a2; cursor: not-allowed; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: left; }
        th { background: #f6f8fa; }
        .status-ok { color: var(--github-green); font-weight: bold; }
        .status-err { color: var(--github-red); font-weight: bold; }
        .loading { font-style: italic; color: #57606a; margin: 10px 0; }
    </style>
</head>
<body>

    <h1>DOI Multi-Checker</h1>
    <div class="controls">
        <p>Enter DOI suffixes (one per line):</p>
        <textarea id="doiInput" placeholder="10.1038/s41586-020-2012-7&#10;10.1126/science.abb7015"></textarea>
        <div class="btn-group">
            <button id="checkBtn" onclick="processDOIs()">Check Status</button>
            <button id="exportBtn" onclick="exportCSV()" style="display:none;">Export to CSV</button>
        </div>
    </div>

    <div id="loader" class="loading" style="display:none;">Querying Crossref Registry...</div>

    <table id="resultsTable" style="display:none;">
        <thead>
            <tr>
                <th>DOI</th>
                <th>Status</th>
                <th>Article Title</th>
                <th>Link</th>
            </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
    </table>

    <script>
        async function processDOIs() {
            const input = document.getElementById('doiInput').value;
            const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const btn = document.getElementById('checkBtn');
            const loader = document.getElementById('loader');
            const tbody = document.getElementById('resultsBody');
            const table = document.getElementById('resultsTable');
            const exportBtn = document.getElementById('exportBtn');

            if (lines.length === 0) return alert("Please enter at least one DOI.");

            // Reset UI
            btn.disabled = true;
            loader.style.display = "block";
            tbody.innerHTML = "";
            table.style.display = "table";
            exportBtn.style.display = "none";

            for (let doi of lines) {
                const apiURL = `https://api.crossref.org/works/${doi}`;
                const row = document.createElement('tr');
                
                try {
                    const response = await fetch(apiURL);
                    if (response.ok) {
                        const data = await response.json();
                        const title = data.message.title ? data.message.title[0] : "No title found";
                        row.innerHTML = `
                            <td>${doi}</td>
                            <td class="status-ok">VALID</td>
                            <td>${title}</td>
                            <td><a href="https://doi.org/${doi}" target="_blank">Open</a></td>`;
                    } else {
                        row.innerHTML = `
                            <td>${doi}</td>
                            <td class="status-err">NOT FOUND (${response.status})</td>
                            <td>-</td>
                            <td>-</td>`;
                    }
                } catch (error) {
                    row.innerHTML = `<td>${doi}</td><td class="status-err">API ERROR</td><td>-</td><td>-</td>`;
                }
                tbody.appendChild(row);
            }

            loader.style.display = "none";
            btn.disabled = false;
            exportBtn.style.display = "inline-block";
        }

        function exportCSV() {
            let csv = "DOI,Status,Title\n";
            const rows = document.querySelectorAll("#resultsBody tr");
            rows.forEach(row => {
                const cols = row.querySelectorAll("td");
                const doi = cols[0].innerText;
                const status = cols[1].innerText;
                const title = cols[2].innerText.replace(/,/g, ""); // Remove commas for CSV
                csv += `${doi},${status},${title}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'doi_report.csv';
            a.click();
        }
    </script>
</body>
</html>
