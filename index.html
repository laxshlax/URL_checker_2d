<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOI Metadata Fetcher</title>

<!-- PDF LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
:root { --green:#2da44e; --red:#cf222e; --blue:#0969da; --border:#d0d7de; }

body {
    font-family:-apple-system,sans-serif;
    max-width:1200px;
    margin:30px auto;
    padding:20px;
}

.box {
    background:#f6f8fa;
    border:1px solid var(--border);
    padding:20px;
    border-radius:6px;
}

textarea {
    width:100%;
    height:100px;
    padding:10px;
    border:1px solid var(--border);
    border-radius:6px;
    margin-bottom:10px;
    font-family:monospace;
}

button {
    background:var(--green);
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
    font-weight:600;
}

#exportBtn { background:var(--blue); margin-left:10px; display:none; }
#pdfBtn { background:#555; margin-left:10px; display:none; }

table {
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    font-size:13px;
}

th,td {
    border:1px solid var(--border);
    padding:8px;
    text-align:left;
}

th { background:#f6f8fa; }

.status-ok { color:var(--green); font-weight:bold; }
.status-err { color:var(--red); font-weight:bold; }
.date-text { color:#cf222e; font-weight:bold; }

a { color:#0969da; text-decoration:none; }
a:hover { text-decoration:underline; }
</style>
</head>

<body>

<h2>DOI Metadata Tool (CSV + PDF Export)</h2>

<div class="box">
    <textarea id="input" placeholder="Paste DOIs (one per line)..."></textarea>
    <button onclick="checkDOIs()">Fetch Metadata</button>
    <button id="exportBtn" onclick="exportCSV()">Export CSV</button>
    <button id="pdfBtn" onclick="exportPDF()">Export PDF</button>
</div>

<table id="resultTable" style="display:none;">
<thead>
<tr>
    <th>DOI</th>
    <th>Status</th>
    <th>Published Online</th>
    <th>Volume</th>
    <th>Issue</th>
    <th>Month</th>
    <th>Journal</th>
    <th>Title</th>
    <th>Link</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

async function checkDOIs() {
    const lines = document.getElementById('input').value.split('\n').filter(l=>l.trim());
    const tbody = document.getElementById('tbody');
    const table = document.getElementById('resultTable');

    tbody.innerHTML="";
    table.style.display="table";

    for (let doi of lines) {
        doi = doi.trim();

        let status="VALID", onlineDate="N/A", journal="-", title="-";
        let volume="-", issue="-", pubMonth="-", isError=false;

        try {
            const res = await fetch(`https://api.crossref.org/works/${doi}`);

            if(res.ok){
                const msg = (await res.json()).message;

                title = msg.title?.[0] || "No title";
                journal = msg['container-title']?.[0] || "-";

                // Online date
                const po = msg['published-online'];
                if(po?.['date-parts']){
                    const p = po['date-parts'][0];
                    onlineDate = `${p[0]}-${String(p[1]||1).padStart(2,'0')}-${String(p[2]||1).padStart(2,'0')}`;
                }

                volume = msg.volume || "-";
                issue = msg.issue || "-";

                const pd = msg['published-print'] || msg['published-online'] || msg['issued'];
                if(pd?.['date-parts']){
                    const m = pd['date-parts'][0][1];
                    if(m) pubMonth = new Date(0,m-1).toLocaleString('en',{month:'long'});
                }

            } else {
                status=`Error ${res.status}`;
                isError=true;
            }

        } catch {
            status="API Error";
            isError=true;
        }

        const link = `https://doi.org/${doi}`;

        tbody.innerHTML += `
        <tr>
            <td>${doi}</td>
            <td class="${isError?'status-err':'status-ok'}">${status}</td>
            <td class="date-text">${onlineDate}</td>
            <td>${volume}</td>
            <td>${issue}</td>
            <td>${pubMonth}</td>
            <td>${journal}</td>
            <td>${title}</td>
            <td><a href="${link}" target="_blank">${link}</a></td>
        </tr>`;
    }

    exportBtn.style.display="inline-block";
    pdfBtn.style.display="inline-block";
}


// CSV EXPORT
function exportCSV(){
    let csv="DOI,Status,PublishedOnline,Volume,Issue,Month,Journal,Title,Link\n";

    document.querySelectorAll("#tbody tr").forEach(tr=>{
        const row=[...tr.querySelectorAll("td")]
            .map(td=>`"${td.innerText.replace(/"/g,'""')}"`);
        csv+=row.join(",")+"\n";
    });

    const blob=new Blob([csv],{type:'text/csv'});
    const url=URL.createObjectURL(blob);

    const a=document.createElement('a');
    a.href=url;
    a.download='DOI_Metadata_Report.csv';
    a.click();
}


// PDF EXPORT (IMPROVED)
function exportPDF(){
    const { jsPDF } = window.jspdf;

    const doc = new jsPDF({
        orientation:"landscape",
        unit:"pt",
        format:"a4"
    });

    const headers=[[
        "DOI","Status","Online","Vol","Issue","Month","Journal","Title","Link"
    ]];

    const rows=[];

    document.querySelectorAll("#tbody tr").forEach(tr=>{
        const cells=tr.querySelectorAll("td");
        rows.push([...cells].map(td=>td.innerText));
    });

    doc.text("DOI Metadata Report",40,30);

    doc.autoTable({
        head:headers,
        body:rows,
        startY:50,

        tableWidth:"wrap",
        styles:{
            fontSize:6,
            cellPadding:2,
            overflow:"linebreak"
        },

        columnStyles:{
            0:{cellWidth:90},
            1:{cellWidth:50},
            2:{cellWidth:70},
            3:{cellWidth:40},
            4:{cellWidth:40},
            5:{cellWidth:60},
            6:{cellWidth:100},
            7:{cellWidth:200},
            8:{cellWidth:180}
        },

        theme:"grid",

        didDrawCell:function(data){
            if(data.column.index===8 && data.cell.section==='body'){
                const url=data.cell.text[0];
                if(url.startsWith("http")){
                    doc.link(
                        data.cell.x,
                        data.cell.y,
                        data.cell.width,
                        data.cell.height,
                        {url:url}
                    );
                }
            }
        }
    });

    doc.save("DOI_Metadata_Report.pdf");
}

</script>

</body>
</html>
