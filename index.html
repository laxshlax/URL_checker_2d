<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link & DOI Validator</title>
    <style>
        :root { --green: #2da44e; --red: #cf222e; --blue: #0969da; --border: #d0d7de; }
        body { font-family: -apple-system, sans-serif; max-width: 900px; margin: 30px auto; padding: 20px; color: #24292f; }
        .box { background: #f6f8fa; border: 1px solid var(--border); padding: 20px; border-radius: 6px; }
        textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 10px; box-sizing: border-box; }
        button { background: var(--green); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        #exportBtn { background: var(--blue); margin-left: 10px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: left; }
        .status-ok { color: var(--green); font-weight: bold; }
        .status-err { color: var(--red); font-weight: bold; }
    </style>
</head>
<body>

    <h2>Universal Link Checker</h2>
    <div class="box">
        <p>Paste DOIs or URLs (one per line):</p>
        <textarea id="input" placeholder="10.1038/s41586-020-2012-7&#10;https://google.com"></textarea>
        <button onclick="checkLinks()">Run Check</button>
        <button id="exportBtn" onclick="exportCSV()">Export CSV</button>
    </div>

    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>Input</th>
                <th>Status</th>
                <th>Title / Detail</th>
                <th>Full Link</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        async function checkLinks() {
            const lines = document.getElementById('input').value.split('\n').filter(l => l.trim());
            const tbody = document.getElementById('tbody');
            const table = document.getElementById('resultTable');
            const exportBtn = document.getElementById('exportBtn');
            
            tbody.innerHTML = "";
            table.style.display = "table";

            for (let raw of lines) {
                let item = raw.trim();
                let isDoi = item.startsWith('10.') && item.includes('/');
                let fullLink = isDoi ? `https://doi.org/${item}` : (item.startsWith('http') ? item : `https://${item}`);
                
                let status = "Checking...";
                let detail = "-";
                let isError = false;

                if (isDoi) {
                    try {
                        const res = await fetch(`https://api.crossref.org/works/${item}`);
                        if (res.ok) {
                            const data = await res.json();
                            status = "VALID DOI";
                            detail = data.message.title ? data.message.title[0] : "No title found";
                        } else {
                            status = "NOT FOUND";
                            isError = true;
                        }
                    } catch (e) { status = "API ERROR"; isError = true; }
                } else {
                    try {
                        // Check standard URL
                        const res = await fetch(fullLink, { mode: 'no-cors' });
                        status = "REACHABLE";
                        detail = "Website responded";
                    } catch (e) {
                        status = "OFFLINE";
                        detail = "Could not connect";
                        isError = true;
                    }
                }

                const row = `<tr>
                    <td>${item}</td>
                    <td class="${isError ? 'status-err' : 'status-ok'}">${status}</td>
                    <td>${detail}</td>
                    <td><a href="${fullLink}" target="_blank">${fullLink}</a></td>
                </tr>`;
                tbody.innerHTML += row;
            }
            exportBtn.style.display = "inline-block";
        }

        function exportCSV() {
            let csv = "Input,Status,Detail,FullLink\n";
            document.querySelectorAll("#tbody tr").forEach(tr => {
                const tds = tr.querySelectorAll("td");
                const row = [tds[0].innerText, tds[1].innerText, tds[2].innerText.replace(/,/g, ""), tds[3].innerText];
                csv += row.join(",") + "\n";
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'link_report.csv';
            a.click();
        }
    </script>
</body>
</html>
