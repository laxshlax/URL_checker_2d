<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced DOI Metadata Fetcher</title>
    <style>
        :root { --green: #2da44e; --red: #cf222e; --blue: #0969da; --border: #d0d7de; }
        body { font-family: -apple-system, sans-serif; max-width: 1000px; margin: 30px auto; padding: 20px; color: #24292f; }
        .box { background: #f6f8fa; border: 1px solid var(--border); padding: 20px; border-radius: 6px; }
        textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 10px; box-sizing: border-box; font-family: monospace; }
        button { background: var(--green); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        #exportBtn { background: var(--blue); margin-left: 10px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: left; vertical-align: top; }
        th { background: #f6f8fa; position: sticky; top: 0; }
        .status-ok { color: var(--green); font-weight: bold; }
        .status-err { color: var(--red); font-weight: bold; }
        .pub-date { color: #57606a; font-weight: 600; }
    </style>
</head>
<body>

    <h2>Academic DOI Tracker</h2>
    <div class="box">
        <p>Enter DOI suffixes (one per line):</p>
        <textarea id="input" placeholder="10.1038/s41586-020-2012-7"></textarea>
        <button onclick="checkDOIs()">Fetch Metadata</button>
        <button id="exportBtn" onclick="exportCSV()">Export CSV Report</button>
    </div>

    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>DOI</th>
                <th>Status</th>
                <th>Publication Date</th>
                <th>Journal/Source</th>
                <th>Article Title</th>
                <th>Full Link</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        async function checkDOIs() {
            const lines = document.getElementById('input').value.split('\n').filter(l => l.trim());
            const tbody = document.getElementById('tbody');
            const table = document.getElementById('resultTable');
            const exportBtn = document.getElementById('exportBtn');
            
            tbody.innerHTML = "";
            table.style.display = "table";

            for (let doi of lines) {
                doi = doi.trim();
                const fullLink = `https://doi.org/${doi}`;
                let status = "VALID", date = "-", journal = "-", title = "-", isError = false;

                try {
                    const res = await fetch(`https://api.crossref.org/works/${doi}`);
                    if (res.ok) {
                        const data = await res.json();
                        const msg = data.message;
                        
                        // Fetch Title
                        title = msg.title ? msg.title[0] : "No title found";
                        
                        // Fetch Journal/Container Name
                        journal = msg['container-title'] ? msg['container-title'][0] : "N/A";
                        
                        // Fetch Publication Date (Crossref uses "published-print" or "published-online")
                        const dateParts = msg['published-print'] || msg['published-online'] || msg['issued'];
                        if (dateParts && dateParts['date-parts']) {
                            const p = dateParts['date-parts'][0];
                            // Format as YYYY-MM or YYYY
                            date = p[0] + (p[1] ? '-' + String(p[1]).padStart(2, '0') : '');
                        }
                    } else {
                        status = `ERROR (${res.status})`;
                        isError = true;
                    }
                } catch (e) {
                    status = "API TIMEOUT";
                    isError = true;
                }

                tbody.innerHTML += `<tr>
                    <td><strong>${doi}</strong></td>
                    <td class="${isError ? 'status-err' : 'status-ok'}">${status}</td>
                    <td class="pub-date">${date}</td>
                    <td>${journal}</td>
                    <td>${title}</td>
                    <td><a href="${fullLink}" target="_blank">${fullLink}</a></td>
                </tr>`;
            }
            exportBtn.style.display = "inline-block";
        }

        function exportCSV() {
            let csv = "DOI,Status,PubDate,Journal,Title,FullLink\n";
            document.querySelectorAll("#tbody tr").forEach(tr => {
                const tds = tr.querySelectorAll("td");
                // Clean text for CSV (remove commas and quotes)
                const row = Array.from(tds).map(td => `"${td.innerText.replace(/"/g, '""')}"`);
                csv += row.join(",") + "\n";
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'DOI_Metadata_Report.csv';
            a.click();
        }
    </script>
</body>
</html>
